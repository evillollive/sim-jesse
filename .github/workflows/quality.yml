name: quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Security and accessibility baseline checks
        run: python3 tools/quality_checks.py

      - name: Dependency vulnerability audit
        shell: bash
        run: |
          set -euo pipefail
          ran_audit=0

          if [ -f package-lock.json ]; then
            ran_audit=1
            npm audit --audit-level=high
          fi

          if [ -f yarn.lock ] || [ -f pnpm-lock.yaml ] || [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            ran_audit=1
            echo "Dependency manifest found without a configured audit command in this workflow."
            echo "Add ecosystem-specific audit steps when those manifests are introduced."
            exit 1
          fi

          if [ "$ran_audit" -eq 0 ]; then
            echo "No dependency manifests detected. Skipping dependency audit."
          fi
